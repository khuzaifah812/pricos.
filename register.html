<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pride College School | Student Registration</title>

    <link rel="stylesheet" href="register.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>
    <div class="header" id="header"></div>

<header>

    <p>Online Student Registration Form</p>

</header>

<div class="container">

<form id="registrationForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdFIMP2TfT4giGa1ZSXwNiFuPWqKlA-P2_Rn7T23qnbIC2Ncw/formResponse"
method="POST"
target="hidden_iframe">

<h2>
<i class="fa-solid fa-user-graduate"></i>
Student Information
</h2>

<div class="row">

<div class="input-box">

<label>First Name</label>

<input
type="text" name="entry.392476994" placeholder="Enter First Name" required>

</div>

<div class="input-box">

<label>Last Name</label>

<input
type="text" name="entry.326381372" placeholder="Enter Last Name" required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Class</label>

<select name="entry.888198802" required>

<option value="">Choose Class</option>

<option>S1</option>
<option>S2</option>
<option>S3</option>
<option>S4</option>
<option>S5</option>
<option>S6</option>

</select>

</div>

<div class="input-box">

<label>Age</label>

<input  type="number" name="entry.1471529435"  required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Date of Birth</label>

<input type="date"  name="entry.754242285" required>

</div>

<div class="input-box">

<label>Tribe</label>

<input type="text" name="entry.906275645" placeholder="Enter Tribe" required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Former School Results (UNEB)</label>

<input type="text" name="entry.396199754" placeholder="Example: Division 1" required>

</div>

<div class="input-box">

<label>Former School</label>

<input type="text" name="entry.840861622" placeholder="Enter Former School" required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Home District</label>

<input type="text" name="entry.1685660306" required>

</div>

<div class="input-box">

<label>Village</label>

<input type="text" name="entry.1153157163" required>

</div>

</div>
    <!-- ===========================
         Father's Information
    ============================ -->

    <h2>
        <i class="fa-solid fa-user"></i>
        Father's Information
    </h2>

    <div class="row">

        <div class="input-box">
            <label>Father's Name</label>

            <input type="text" name="entry.719487070" placeholder="Enter Father's Name" required>

        </div>

        <div class="input-box">

            <label>Contact</label>

            <input type="tel" name="entry.825095024" placeholder="07XXXXXXXX"  required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Occupation</label>

            <input  type="text"  name="entry.181146899"  placeholder="Occupation" required>

        </div>

        <div class="input-box">

            <label>District</label>

            <input type="text"  name="entry.469629004"   placeholder="District"  required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Village</label>

            <input  type="text"   name="entry.682662948"  placeholder="Village"  required>

        </div>

    </div>



    <!-- ===========================
         Mother's Information
    ============================ -->

    <h2>
        <i class="fa-solid fa-user"></i>
        Mother's Information
    </h2>

    <div class="row">

        <div class="input-box">

            <label>Mother's Name</label>

            <input type="text"  name="entry.2067144963" placeholder="Mother's Name"  required>

        </div>

        <div class="input-box">

            <label>Contact</label>

            <input type="tel" name="entry.936181182" placeholder="07XXXXXXXX" required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Occupation</label>

            <input type="text" name="entry.159305700" placeholder="Occupation" required>

        </div>

        <div class="input-box">

            <label>District</label>

            <input type="text" name="entry.168325290" placeholder="District" required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Village</label>

            <input type="text" name="entry.654589330" placeholder="Village" required>

        </div>

    </div>



    <!-- ===========================
         Guardian Information
    ============================ -->

    <h2>
        <i class="fa-solid fa-user-shield"></i>
        Guardian Information
    </h2>

    <div class="row">

        <div class="input-box">

            <label>Guardian's Name</label>

            <input  type="text" name="entry.266500097" placeholder="Guardian Name" required>

        </div>

        <div class="input-box">

            <label>Contact</label>

            <input type="tel" name="entry.1977923307" placeholder="07XXXXXXXX"  required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Occupation</label>

            <input  type="text" name="entry.303212817" placeholder="Occupation" required>

        </div>

        <div class="input-box">

            <label>District</label>

            <input type="text" name="entry.1043212859" placeholder="District" required>

        </div>

    </div>

    <div class="row">

        <div class="input-box">

            <label>Village</label>

            <input type="text"  name="entry.581962443"  placeholder="Village" required>

        </div>

    </div>

   


    <!-- Buttons -->

    <div class="button-group">

        <button type="reset" class="reset-btn">
            <i class="fa-solid fa-rotate-left"></i>
            Reset Form
        </button>

        <button type="submit" class="submit-btn">
            <i class="fa-solid fa-paper-plane"></i>
            Submit Registration
        </button>

    </div>

</form>

<!-- Hidden iframe prevents Google Form page from opening -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;">
</iframe>

<!-- Success Message -->

<div id="successMessage" class="success-message">

    <i class="fa-solid fa-circle-check"></i>

    <h2>Registration Submitted Successfully!</h2>

    <p>
        Thank you for choosing
        <strong>Pride College School.</strong>
        Your registration has been received successfully.
    </p>

</div>

</div>

<footer>
    <div class="footer" id="footer"></div>


</footer>

<script src="register.js"></script>
<script src="school.js"></script>


</body>
</html>
